name: Morning News Bot

on:
  schedule:
    # UTC 기준 22:00 = 한국 시간 오전 7:00
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동으로도 실행해볼 수 있게 하는 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 라이브러리 설치
      run: |
        pip install feedparser requests g4f

    - name: 뉴스 봇 실행
      run: python newsbot_sector_split.py
